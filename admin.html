<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<style>
body{
margin:0;
background:#0b0b0b;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#111;
padding:30px;
border-radius:15px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
background:#1a1a1a;
color:white;
}

button{
width:100%;
padding:10px;
background:orange;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.dashboard{
display:none;
}
</style>
</head>

<body>

<div class="box" id="loginBox">
<h2>ADMIN LOGIN</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">LOGIN</button>
</div>

<div class="dashboard" id="dash">
<h2>FITCOWOK ADMIN</h2>

<input id="name" placeholder="Nama produk">
<input id="price" placeholder="Harga">
<input id="image" placeholder="Link gambar">
<input id="link" placeholder="Link afiliasi">

<button onclick="add()">Tambah Produk</button>

</div>

<script>

function login(){
let u = document.getElementById("user").value;
let p = document.getElementById("pass").value;

if(u==="admin" && p==="123"){
document.getElementById("loginBox").style.display="none";
document.getElementById("dash").style.display="block";
}else{
alert("Login gagal");
}
}

// simpan ke localStorage
function add(){
let data = JSON.parse(localStorage.getItem("products")||"[]");

data.push({
name:document.getElementById("name").value,
price:document.getElementById("price").value,
image:document.getElementById("image").value,
link:document.getElementById("link").value
});

localStorage.setItem("products",JSON.stringify(data));

alert("Produk ditambahkan!");
}
</script>

</body>
</html>
