<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Produk - FITCOWOK.ID</title>
<link rel="stylesheet" href="style.css">
<style>
  /* Tambahan style buat login */
 .login-box {max-width: 400px; margin: 100px auto; padding: 30px; background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.1);}
 .login-box input,.login-box button {width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ddd; border-radius: 8px;}
 .login-box button {background: #111; color: #fff; cursor: pointer; border: none;}
 .hidden {display: none!important;}
</style>
</head>
<body>

<!-- 1. BOX LOGIN -->
<div class="login-box" id="loginBox">
  <h1>Login Admin</h1>
  <input id="username" placeholder="Username" required>
  <input id="password" type="password" placeholder="Password" required>
  <button id="btnLogin">Masuk</button>
  <p id="loginError" style="color:red; font-size: 14px;"></p>
</div>

<!-- 2. BOX ADMIN - DISEMBUNYIKAN DULU -->
<div class="admin-box hidden" id="adminBox">
  <button class="back" id="btnLogout" style="float:right; background:#ef4444; color:#fff; border:none; padding:8px 12px; border-radius:8px; cursor:pointer;">Logout</button>
  <a class="back" href="index.html">← Kembali ke Website</a>
  <h1>Admin Produk</h1>
  <p class="small-note">Versi ini bisa tambah/edit produk tanpa ubah coding. Catatan: karena GitHub Pages tidak punya database, data tersimpan di browser kamu lewat localStorage. Untuk tampil ke semua orang, nanti kita perlu Firebase/Supabase.</p>

  <form class="form" id="productForm">
    <div class="row">
      <input id="nama" placeholder="Nama produk" required>
      <input id="harga" placeholder="Harga, contoh Rp 99.000" required>
    </div>
    <div class="row">
      <select id="cat" required>
        <option value="branda">Branda / Outfit</option>
        <option value="baju">Baju</option>
        <option value="celanaPanjang">Celana Panjang</option>
        <option value="celanaPendek">Celana Pendek</option>
        <option value="jam">Jam Tangan</option>
        <option value="sepatu">Sepatu</option>
      </select>
      <input id="link" placeholder="Link afiliasi" required>
    </div>
    <textarea id="desc" placeholder="Deskripsi singkat" required></textarea>

    <!-- UBAH: dari input link jadi input file -->
    <label>Upload Gambar:</label>
    <input id="gambarFile" type="file" accept="image/*" required>
    <img id="previewGambar" style="max-width: 150px; margin-top: 10px; display:none;">

    <button class="save" type="submit">+ Tambah Produk</button>
  </form>
  <div class="product-admin" id="adminList"></div>
</div>

<script src="script.js"></script>
<script>
// ===== 1. SISTEM LOGIN PALSU =====
const USERNAME_BENAR = "admin"; // GANTI INI
const PASSWORD_BENAR = "fitcowok123"; // GANTI INI

const loginBox = document.getElementById('loginBox');
const adminBox = document.getElementById('adminBox');

function cekLogin(){
  if(sessionStorage.getItem('isLoggedIn') === 'true'){
    loginBox.classList.add('hidden');
    adminBox.classList.remove('hidden');
    renderAdmin();
  }
}

document.getElementById('btnLogin').addEventListener('click', () => {
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;
  if(user === USERNAME_BENAR && pass === PASSWORD_BENAR){
    sessionStorage.setItem('isLoggedIn', 'true'); // pakai sessionStorage biar ilang kalau tab ditutup
    cekLogin();
  } else {
    document.getElementById('loginError').innerText = 'Username atau Password salah!';
  }
});

document.getElementById('btnLogout').addEventListener('click', () => {
  sessionStorage.removeItem('isLoggedIn');
  location.reload(); // refresh balik ke login
});

cekLogin(); // cek pas pertama load

// ===== 2. UPLOAD BERKAS JADI BASE64 =====
let gambarBase64 = "";
document.getElementById('gambarFile').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (event) => {
    gambarBase64 = event.target.result; // simpan jadi base64
    document.getElementById('previewGambar').src = gambarBase64;
    document.getElementById('previewGambar').style.display = 'block';
  };
  reader.readAsDataURL(file);
});

// ===== 3. LOGIKA PRODUK KAMU YG LAMA, TAPI DIEDIT =====
const form=document.getElementById('productForm');
function renderAdmin(){
 const list=document.getElementById('adminList'); const products=getProducts();
 list.innerHTML=products.map((p,i)=>`<div class="admin-item"><img src="${p.gambar}"><div><b>${p.nama}</b><br><small>${p.cat} • ${p.harga}</small></div><button class="danger" onclick="deleteProduct(${i})">Hapus</button></div>`).join('');
}
function deleteProduct(i){const products=getProducts();products.splice(i,1);saveProducts(products);renderAdmin();}

form.addEventListener('submit',e=>{
  e.preventDefault();
  if(!gambarBase64){ alert('Upload gambar dulu'); return; }
  const products=getProducts();
  products.push({
    nama:nama.value,
    harga:harga.value,
    cat:cat.value,
    link:link.value,
    desc:desc.value,
    gambar: gambarBase64 // simpan gambarnya langsung
  });
  saveProducts(products);
  form.reset();
  document.getElementById('previewGambar').style.display = 'none';
  gambarBase64 = "";
  renderAdmin();
  alert('Produk berhasil ditambahkan');
});

// Asumsi kamu punya 2 fungsi ini di script.js
function getProducts(){ return JSON.parse(localStorage.getItem('products') || '[]'); }
function saveProducts(p){ localStorage.setItem('products', JSON.stringify(p)); }

</script>
</body>
</html>
