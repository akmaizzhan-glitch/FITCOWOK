<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin FITCOWOK</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="admin-body">
  <main class="admin-wrap">
    <section id="loginBox" class="admin-card login-card">
      <img src="assets/logo-fc.png" alt="logo">
      <h1>Admin Login</h1>
      <input id="adminPass" type="password" placeholder="Password admin">
      <button id="loginBtn" class="primary">Masuk</button>
      <p class="muted">Password awal: <b>fitcowok2024</b></p>
    </section>

    <section id="adminPanel" class="hidden">
      <div class="admin-head">
        <h1>Dashboard Produk</h1>
        <a href="index.html">Lihat Website</a>
      </div>
      <form id="productForm" class="admin-card form-grid">
        <input type="hidden" id="productId">
        <input id="name" placeholder="Nama produk" required>
        <input id="price" type="number" placeholder="Harga" required>
        <select id="category" required>
          <option value="Baju">Baju</option>
          <option value="Celana Panjang">Celana Panjang</option>
          <option value="Celana Pendek">Celana Pendek</option>
          <option value="Jam Tangan">Jam Tangan</option>
          <option value="Sepatu">Sepatu</option>
          <option value="Outfit">Outfit</option>
        </select>
        <input id="image" placeholder="Link gambar produk" required>
        <textarea id="description" placeholder="Deskripsi produk"></textarea>
        <button class="primary" type="submit">Simpan Produk</button>
        <button id="resetBtn" type="button" class="ghost">Reset</button>
      </form>
      <div id="adminList" class="admin-list"></div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
