<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FITCOWOK.ID</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
  <aside class="sidebar">
    <div class="brand-row"><button class="menu-btn">☰</button><b>FITCOWOK.ID</b></div>
    <nav>
      <a class="active" data-filter="all">⌂ <span>Branda</span></a>
      <a data-filter="Baju">👕 <span>Baju</span></a>
      <a data-filter="Celana Panjang">👖 <span>Celana Panjang</span></a>
      <a data-filter="Celana Pendek">🩳 <span>Celana Pendek</span></a>
      <a data-filter="Jam Tangan">⌚ <span>Jam Tangan</span></a>
      <a data-filter="Sepatu">👟 <span>Sepatu</span></a>
    </nav>
  </aside>

  <header class="topbar">
    <div></div>
    <div class="search-box"><input id="searchInput" type="search" placeholder="Cari produk..."/><span>⌕</span></div>
    <button id="themeBtn" class="icon-btn">◔</button>
    <button id="cartBtn" class="cart-btn">🛒<small id="cartCount">0</small></button>
  </header>

  <main class="main">
    <section class="hero"><img src="assets/logo-fc.png" alt="FITCOWOK logo"></section>

    <section class="outfit-section">
      <div class="section-title"><h2>✨ SPIL HASIL OUTFIT</h2><button>Lihat Semua ›</button></div>
      <div class="outfit-grid" id="outfitGrid"></div>
    </section>

    <div id="productSections" class="category-layout"></div>

    <footer class="benefits">
      <div>♙ <b>Produk Berkualitas</b><span>Pilihan terbaik & terpercaya</span></div>
      <div>🏷 <b>Harga Terbaik</b><span>Harga bersaing setiap hari</span></div>
      <div>▣ <b>Pengiriman Cepat</b><span>Aman & sampai cepat</span></div>
      <div>♧ <b>100% Aman</b><span>Belanja aman & nyaman</span></div>
    </footer>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <button id="closeModal" class="close">×</button>
      <img id="modalImg" src="" alt="">
      <div>
        <h2 id="modalName"></h2>
        <p id="modalDesc"></p>
        <h3 id="modalPrice"></h3>
        <button id="addCart" class="primary">Tambah ke Keranjang</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
