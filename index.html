<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FITCOWOK.ID</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

.header{
padding:15px;
background:#111;
text-align:center;
font-weight:bold;
font-size:18px;
}

.container{
padding:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.card{
background:#151515;
border-radius:15px;
overflow:hidden;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
background:#222;
}

.card-body{
padding:10px;
}

.price{
color:orange;
margin-top:5px;
font-weight:bold;
}

.btn{
display:block;
margin-top:8px;
padding:8px;
background:orange;
color:black;
text-align:center;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

@media(max-width:700px){
.grid{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>

<body>

<div class="header">FITCOWOK.ID</div>

<div class="container">
<div class="grid" id="productList"></div>
</div>

<script>
function loadProducts(){
let data = JSON.parse(localStorage.getItem("products")) || [];

let box = document.getElementById("productList");
box.innerHTML = "";

data.forEach(p=>{
box.innerHTML += `
<div class="card">
<img src="${p.image}">
<div class="card-body">
<div>${p.name}</div>
<div class="price">${p.price}</div>
<a class="btn" href="${p.link}" target="_blank">Lihat</a>
</div>
</div>
`;
});
}

loadProducts();
</script>

</body>
</html>
