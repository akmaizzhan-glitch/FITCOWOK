<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FITCOWOK.ID</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#080808;
  color:white;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.65);
  display:none;
  z-index:90;
}

.overlay.active{
  display:block;
}

.sidebar{
  position:fixed;
  left:-280px;
  top:0;
  width:260px;
  height:100%;
  background:#111;
  padding:20px;
  z-index:100;
  transition:.3s;
  border-right:1px solid #222;
}

.sidebar.active{
  left:0;
}

.side-logo{
  font-size:22px;
  font-weight:bold;
  margin-bottom:30px;
}

.menu button{
  width:100%;
  background:none;
  border:none;
  color:#ddd;
  text-align:left;
  padding:14px;
  border-radius:12px;
  margin-bottom:8px;
  font-size:15px;
  cursor:pointer;
}

.menu button.active,
.menu button:hover{
  background:#1d1d1d;
  color:#ff7a00;
}

.topbar{
  height:68px;
  background:#0d0d0d;
  display:flex;
  align-items:center;
  justify-content:center;
  position:sticky;
  top:0;
  z-index:50;
  border-bottom:1px solid #1d1d1d;
}

.menu-btn{
  position:absolute;
  left:18px;
  background:#1a1a1a;
  border:none;
  color:white;
  font-size:28px;
  padding:8px 14px;
  border-radius:12px;
  cursor:pointer;
}

.brand-title{
  font-size:22px;
  font-weight:bold;
  letter-spacing:1px;
}

.container{
  padding:20px;
  max-width:1250px;
  margin:auto;
}

.logo-banner{
  width:100%;
  height:300px;
  background:#111;
  border-radius:22px;
  overflow:hidden;
  border:2px solid #333;
  margin-bottom:25px;
}

.logo-banner img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.section-title{
  font-size:24px;
  font-weight:bold;
  margin:25px 0 15px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
}

.card{
  background:#151515;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,.35);
  transition:.25s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
  background:#222;
}

.card-body{
  padding:14px;
}

.card h3{
  font-size:16px;
  margin-bottom:6px;
}

.card p{
  color:#aaa;
  font-size:14px;
}

.price{
  color:#ff7a00;
  font-weight:bold;
  margin-top:8px;
}

.btn{
  display:block;
  margin-top:12px;
  padding:11px;
  background:#ff6a00;
  color:white;
  text-align:center;
  text-decoration:none;
  border-radius:12px;
  font-weight:bold;
}

.footer{
  text-align:center;
  color:#777;
  padding:35px 0;
}

@media(max-width:700px){
  .container{
    padding:14px;
  }

  .logo-banner{
    height:210px;
  }

  .grid{
    grid-template-columns:repeat(3,1fr);
    gap:10px;
  }

  .card img{
    height:105px;
  }

  .card-body{
    padding:8px;
  }

  .card h3{
    font-size:12px;
  }

  .card p,
  .price{
    font-size:11px;
  }

  .btn{
    font-size:11px;
    padding:8px;
  }

  .section-title{
    font-size:18px;
  }
}
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<aside class="sidebar" id="sidebar">
  <div class="side-logo">FITCOWOK.ID</div>

  <div class="menu">
    <button class="active" onclick="showCategory('branda', this)">🏠 Branda</button>
    <button onclick="showCategory('baju', this)">👕 Baju</button>
    <button onclick="showCategory('celanaPanjang', this)">👖 Celana Panjang</button>
    <button onclick="showCategory('celanaPendek', this)">🩳 Celana Pendek</button>
    <button onclick="showCategory('jam', this)">⌚ Jam Tangan</button>
    <button onclick="showCategory('sepatu', this)">👟 Sepatu</button>
  </div>
</aside>

<header class="topbar">
  <button class="menu-btn" onclick="openMenu()">☰</button>
  <div class="brand-title">FITCOWOK.ID</div>
</header>

<main class="container" id="app"></main>

<footer class="footer">
  © 2026 FITCOWOK.ID
</footer>

<script>
const data = {
  branda: {
    title: "🔥 SPIL HASIL OUTFIT",
    banner: true,
    products: [
      ["Outfit Casual", "Simple & nyaman", "Rp 199.000", "https://via.placeholder.com/400x500"],
      ["Street Style", "Cool & stylish", "Rp 249.000", "https://via.placeholder.com/400x500"],
      ["Daily Look", "Minimalis & rapi", "Rp 189.000", "https://via.placeholder.com/400x500"],
      ["All Black", "Bold & clean", "Rp 299.000", "https://via.placeholder.com/400x500"],
      ["Smart Casual", "Rapi & keren", "Rp 259.000", "https://via.placeholder.com/400x500"],
      ["Simple Look", "Fresh & effortless", "Rp 179.000", "https://via.placeholder.com/400x500"]
    ]
  },

  baju: {
    title: "👕 BAJU",
    products: [
      ["Oversize Tee", "Kaos oversize pria", "Rp 99.000", "https://via.placeholder.com/400x500"],
      ["Basic Tee", "Kaos polos basic", "Rp 79.000", "https://via.placeholder.com/400x500"],
      ["Striped Shirt", "Kemeja motif garis", "Rp 129.000", "https://via.placeholder.com/400x500"],
      ["Polo Shirt", "Polo casual pria", "Rp 119.000", "https://via.placeholder.com/400x500"]
    ]
  },

  celanaPanjang: {
    title: "👖 CELANA PANJANG",
    products: [
      ["Cargo Pants", "Celana cargo pria", "Rp 149.000", "https://via.placeholder.com/400x500"],
      ["Jeans Slim Fit", "Celana jeans slim", "Rp 159.000", "https://via.placeholder.com/400x500"],
      ["Chino Pants", "Celana chino casual", "Rp 139.000", "https://via.placeholder.com/400x500"],
      ["Formal Pants", "Celana bahan pria", "Rp 149.000", "https://via.placeholder.com/400x500"]
    ]
  },

  celanaPendek: {
    title: "🩳 CELANA PENDEK",
    products: [
      ["Short Pants", "Celana pendek santai", "Rp 89.000", "https://via.placeholder.com/400x500"],
      ["Cargo Pendek", "Celana pendek cargo", "Rp 99.000", "https://via.placeholder.com/400x500"],
      ["Chino Pendek", "Celana pendek chino", "Rp 89.000", "https://via.placeholder.com/400x500"]
    ]
  },

  jam: {
    title: "⌚ JAM TANGAN",
    products: [
      ["Analog Classic", "Jam tangan klasik", "Rp 299.000", "https://via.placeholder.com/400x500"],
      ["Chronograph", "Jam pria sporty", "Rp 359.000", "https://via.placeholder.com/400x500"],
      ["Digital Sport", "Jam digital pria", "Rp 199.000", "https://via.placeholder.com/400x500"]
    ]
  },

  sepatu: {
    title: "👟 SEPATU",
    products: [
      ["Sneakers Putih", "Sepatu putih clean", "Rp 299.000", "https://via.placeholder.com/400x500"],
      ["Sneakers Hitam", "Sepatu hitam casual", "Rp 299.000", "https://via.placeholder.com/400x500"],
      ["Loafers", "Sepatu formal casual", "Rp 289.000", "https://via.placeholder.com/400x500"]
    ]
  }
};

function render(category){
  const app = document.getElementById("app");
  const item = data[category];

  let html = "";

  if(item.banner){
    html += `
      <div class="logo-banner">
        <img src="logo.png" alt="FITCOWOK Logo">
      </div>
    `;
  }

  html += `<div class="section-title">${item.title}</div>`;
  html += `<div class="grid">`;

  item.products.forEach(p => {
    html += `
      <div class="card">
        <img src="${p[3]}" alt="${p[0]}">
        <div class="card-body">
          <h3>${p[0]}</h3>
          <p>${p[1]}</p>
          <div class="price">${p[2]}</div>
          <a class="btn" href="#" target="_blank">Lihat Produk</a>
        </div>
      </div>
    `;
  });

  html += `</div>`;
  app.innerHTML = html;
}

function showCategory(category, btn){
  document.querySelectorAll(".menu button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  render(category);
  closeMenu();
}

function openMenu(){
  document.getElementById("sidebar").classList.add("active");
  document.getElementById("overlay").classList.add("active");
}

function closeMenu(){
  document.getElementById("sidebar").classList.remove("active");
  document.getElementById("overlay").classList.remove("active");
}

render("branda");
</script>

</body>
</html>
